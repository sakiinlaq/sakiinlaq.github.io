
title: Axmed Cabdulqaadir Sheikh
email:
description: >- # this means to ignore newlines until "baseurl:"
  Waxaan ahay qoraa, waxaanan ku noolahay magaalada Göteborg ee dalka Sweden. Waxaan qorayaa maqaallo ku saabsan arrimaha bulshada, dhaqanka, iyo luqadda , gaar ahaan kuwa saameeya Soomaalida iyo iyo af Soomaaliga.
twitter_username: sakiinlaq
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


analytics:
  provider               : "google-universal" # false (default), "google", "google-universal", "google-gtag", "custom"
  google:
    tracking_id          : "G-4E1G39JFY3" # Replace this with your ID, or delete
    anonymize_ip         : true

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Axmed Cabdulqaadir Sheikh"
  avatar : https://pbs.twimg.com/profile_images/927280578692567042/BS5Ptp5a_400x400.jpg
  bio    : ""
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "http://www.sakiinlaq.com"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/sakiinlaq"

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/sakiinlaq"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: "_korbus"
      type: korbus
    values:
      layout: collection
      author_profile: false
      share: false
      sidebar:
        nav: "korbus"
  - scope:
      type: ortagrafi
    values:
      layout: collection
      classes: wide
      author_profile: true
      sidebar:
       nav: "ortagrafi"

#_Collections
collections:
  korbus:
    output: true
    permalink: /:collection/:path/
  ortagrafi:
    output: true
    permalink: /:collection/:path/


category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
